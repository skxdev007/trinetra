<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinetra Architecture - Explained for Beginners</title>
    <link rel="stylesheet" href="architecture-styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div>
                    <a href="index.html" class="nav-link">← Home</a>
                    <a href="#overview" class="nav-link">Overview</a>
                    <a href="#pipeline" class="nav-link">Pipeline</a>
                    <a href="#components" class="nav-link">Components</a>
                    <a href="#innovations" class="nav-link">Innovations</a>
                </div>
                <span class="header-title">Trinetra Architecture</span>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="content"></div>
    </main>

    <footer>
        <div class="container">
            <p>Made with ☕ & ❤️ in India 🇮🇳 for the world</p>
            <p>
                <a href="https://github.com/skxdev007/trinetra">GitHub</a> |
                <a href="index.html">Documentation</a> |
                <a href="https://doi.org/10.5281/zenodo.18850769">DOI</a>
            </p>
        </div>
    </footer>

    <script>
        // Initialize Mermaid
        mermaid.initialize({ 
            startOnLoad: false,
            theme: 'base',
            themeVariables: {
                primaryColor: '#f9f6f2',
                primaryTextColor: '#1a1a1a',
                primaryBorderColor: '#d4c5b9',
                lineColor: '#4a4a4a',
                secondaryColor: '#ffffff',
                tertiaryColor: '#faf8f5',
                fontSize: '14px',
                fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif'
            }
        });

        // Load and render the architecture markdown
        async function loadArchitecture() {
            try {
                const response = await fetch('architecture-explained.md');
                const markdown = await response.text();
                
                // Configure marked options
                marked.setOptions({
                    breaks: true,
                    gfm: true,
                    headerIds: true,
                    mangle: false
                });
                
                // Convert markdown to HTML
                let html = marked.parse(markdown);
                
                // Wrap mermaid code blocks in diagram boxes
                html = html.replace(/<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/g, 
                    '<div class="diagram-box"><div class="mermaid">$1</div></div>');
                
                // Render to page
                document.getElementById('content').innerHTML = html;
                
                // Render Mermaid diagrams
                await mermaid.run();
                
                // Add smooth scroll to anchor links
                document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                    anchor.addEventListener('click', function (e) {
                        e.preventDefault();
                        const target = document.querySelector(this.getAttribute('href'));
                        if (target) {
                            target.scrollIntoView({ behavior: 'smooth' });
                        }
                    });
                });
                
                // Show page
                document.body.classList.add('loaded');
            } catch (error) {
                console.error('Error loading architecture content:', error);
                document.getElementById('content').innerHTML = 
                    '<div class="error"><h1>Error loading content</h1><p>Please check that architecture-explained.md exists.</p></div>';
            }
        }

        // Load content when page loads
        document.addEventListener('DOMContentLoaded', loadArchitecture);
    </script>
</body>
</html>
