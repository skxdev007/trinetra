<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">SHARINGAN-DEEP | Architecture Reference</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-subtitle" id="header-text"></div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1 id="site-title"></h1>
            <p class="subtitle" id="site-subtitle"></p>
            <p class="tagline" id="site-tagline"></p>
        </section>

        <section class="core-insight">
            <h2 id="core-insight-title"></h2>
            <div class="highlight-box">
                <p><em id="core-insight-highlight"></em></p>
            </div>
            <p class="insight-explanation" id="core-insight-explanation"></p>
        </section>

        <section class="overview">
            <h2 id="overview-title"></h2>
            <p id="overview-intro"></p>
            <ul id="overview-features"></ul>
            <p id="overview-conclusion"></p>
        </section>

        <section class="architecture">
            <h2 id="architecture-title"></h2>
            <div id="architecture-components"></div>
        </section>

        <section class="why-it-works">
            <h2 id="comparison-title"></h2>
            <div class="comparison">
                <div class="comparison-col">
                    <h4 id="reactive-title"></h4>
                    <ul id="reactive-points"></ul>
                </div>
                <div class="comparison-col">
                    <h4 id="proactive-title"></h4>
                    <ul id="proactive-points"></ul>
                </div>
            </div>
            <p class="why-conclusion" id="comparison-conclusion"></p>
        </section>

        <section class="results">
            <h2 id="results-title"></h2>
            <p id="results-intro"></p>
            <div class="results-grid" id="results-metrics"></div>
        </section>

        <section class="use-cases">
            <h2 id="use-cases-title"></h2>
            <div id="use-cases-list"></div>
        </section>

        <section class="technical-details">
            <h2 id="technical-title"></h2>
            <div class="tech-grid" id="technical-specs"></div>
        </section>

        <section class="getting-started">
            <h2 id="getting-started-title"></h2>
            <div class="code-block">
                <pre><code id="getting-started-code"></code></pre>
            </div>
        </section>

        <section class="future">
            <h2 id="future-title"></h2>
            <ul id="future-directions"></ul>
        </section>
    </main>

    <footer>
        <div class="container">
            <p id="footer-tagline"></p>
            <p id="footer-links"></p>
        </div>
    </footer>

    <script src="parser.js"></script>
</body>
</html>
