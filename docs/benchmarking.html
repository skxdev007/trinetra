<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinetra Benchmarking Results</title>
    <link rel="stylesheet" href="architecture-styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="nav-links">
                    <a href="/trinetra/" class="nav-link">Home</a>
                    <a href="/trinetra/architecture.html" class="nav-link">Architecture</a>
                    <a href="/trinetra/benchmarking.html" class="nav-link">Benchmarking</a>
                    <a href="/trinetra/about.html" class="nav-link">About</a>
                </div>
                <span class="nav-brand">TRINETRA</span>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="content"></div>
    </main>

    <footer>
        <div class="container">
            <p>Made with ☕ & ❤️ in India 🇮🇳 for the world</p>
            <p>
                <a href="https://github.com/skxdev007/trinetra">GitHub</a> |
                <a href="index.html">Documentation</a> |
                <a href="https://doi.org/10.5281/zenodo.18850769">DOI</a>
            </p>
            <div class="footer-contact">
                <p><strong>Looking for Research Opportunities</strong></p>
                <p>I am seeking research internships and collaborations to develop this work into a research paper.</p>
                <p>Contact: <a href="mailto:academic.skhavin@gmail.com">academic.skhavin@gmail.com</a></p>
            </div>
        </div>
    </footer>

    <script>
        // Load and render the benchmarking markdown
        async function loadBenchmarking() {
            try {
                const response = await fetch('benchmarking.md');
                const markdown = await response.text();
                
                // Configure marked options
                marked.setOptions({
                    breaks: true,
                    gfm: true,
                    headerIds: true,
                    mangle: false
                });
                
                // Convert markdown to HTML
                let html = marked.parse(markdown);
                
                // Render to page
                document.getElementById('content').innerHTML = html;
                
                // Add smooth scroll to anchor links
                document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                    anchor.addEventListener('click', function (e) {
                        e.preventDefault();
                        const target = document.querySelector(this.getAttribute('href'));
                        if (target) {
                            target.scrollIntoView({ behavior: 'smooth' });
                        }
                    });
                });
                
                // Show page
                document.body.classList.add('loaded');
            } catch (error) {
                console.error('Error loading benchmarking content:', error);
                document.getElementById('content').innerHTML = 
                    '<div class="error"><h1>Error loading content</h1><p>Please check that benchmarking.md exists.</p></div>';
            }
        }

        // Load content when page loads
        document.addEventListener('DOMContentLoaded', loadBenchmarking);
    </script>
</body>
</html>
